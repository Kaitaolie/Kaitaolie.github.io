baseURL = "https://Kaitaolie.github.io/"
title = "Kai's Tech Log"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true

[pagination]
pagerSize = 6

[markup]
[markup.highlight]
noClasses = false
style = "monokai"

[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[params]
author = "Kai"
info = ["GIS Undergraduate at NEFU", "Tech enthusiast"]
avatarURL = "images/avatar.jpg"
dateFormat = "2006-01-02"
since = 2026
colorScheme = "auto"
hideColorSchemeToggle = false
customCSS = ["css/custom.css"]

[taxonomies]
category = "categories"
series = "series"
tag = "tags"

[[params.social]]
name = "Github"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/Kaitaolie/"

[[menu.main]]
name = "Home"
weight = 1
url = "home/"

[[menu.main]]
