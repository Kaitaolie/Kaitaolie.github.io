baseURL = "https://kai.github.io/"
title = "Kai's Tech Log"
theme = "hugo-coder"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
enableEmoji = true

[pagination]
pagerSize = 6

[markup]
[markup.highlight]
noClasses = false
# 确保代码块背景色好看
style = "monokai" 

[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true # 允许在 Markdown 中使用 HTML

[params]
author = "Kai"
description = "NEFU GIS | 自动化工程师进修中"
keywords = "WSL, Termux, C/C++, GIS, 自动化"
info = ["GIS Undergraduate at NEFU", "Linux & C++ Enthusiast"]
avatarURL = "images/avatar.jpg"
dateFormat = "2006年01月02日"
since = 2026

# 颜色模式：auto 会跟随系统，如果你喜欢极简黑白，可以固定为 "dark" 或 "light"
colorScheme = "auto"
hideColorSchemeToggle = false

[taxonomies]
category = "categories"
series = "series"
tag = "tags"

# --- 社交链接配置 ---
[[params.social]]
name = "Github"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/你的用户名/" # 这里记得改

# --- 菜单配置 ---
[[menu.main]]
name = "文章"
weight = 1
url = "posts/"

[[menu.main]]
name = "关于我"
weight = 2
url = "about/"